name: Auto-Remediation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'   # Daily at 5 AM

permissions:
  actions: write
  contents: write
  pull-requests: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.5
        with:
          cache: true
          version: v0.69.3

      - uses: docker/setup-buildx-action@v4.0.0

      # Initial build for scanning
      - name: Build image for scanning
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          pull: true
          push: false
          load: true
          tags: alpinetools:scan
          build-args: |
            GO_VERSION=1.25.8
          cache-from: type=gha

      # Scan and save results
      - name: Trivy vulnerability scan (JSON output)
        id: trivy_scan
        continue-on-error: true
        run: |
          trivy image --format json --output trivy-results.json \
            --vuln-type os,library \
            --severity HIGH,CRITICAL \
            alpinetools:scan

      - name: Check for vulnerabilities
        id: check_vulns
        run: |
          if [ -f trivy-results.json ]; then
            vuln_count=$(jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' trivy-results.json)
            echo "Found $vuln_count vulnerabilities"
            echo "vuln_count=$vuln_count" >> $GITHUB_OUTPUT
            
            if [ "$vuln_count" -gt 0 ]; then
              echo "has_vulns=true" >> $GITHUB_OUTPUT
            else
              echo "has_vulns=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_vulns=false" >> $GITHUB_OUTPUT
            echo "vuln_count=0" >> $GITHUB_OUTPUT
          fi

      # Extract vulnerable packages
      - name: Extract vulnerable packages
        id: extract_packages
        if: steps.check_vulns.outputs.has_vulns == 'true'
        run: |
          # Only Alpine OS packages can be remediated with apk.
          packages=$(jq -r '
            [
              .Results[]?
              | select(.Type == "alpine")
              | .Vulnerabilities[]?
              | select(.Severity == "HIGH" or .Severity == "CRITICAL")
              | .PkgName
            ]
            | unique
            | join(" ")
          ' trivy-results.json)
          skipped_targets=$(jq -r '
            [
              .Results[]?
              | select(.Type != "alpine")
              | select((.Vulnerabilities // []) | length > 0)
              | .Target
            ]
            | unique
            | join(", ")
          ' trivy-results.json)
          echo "Fixable Alpine packages: ${packages:-<none>}"
          echo "Non-apk vulnerable targets: ${skipped_targets:-<none>}"
          echo "packages=$packages" >> $GITHUB_OUTPUT
          if [ -n "$packages" ]; then
            echo "has_fixable_packages=true" >> $GITHUB_OUTPUT
          else
            echo "has_fixable_packages=false" >> $GITHUB_OUTPUT
          fi
          echo "skipped_targets=$skipped_targets" >> $GITHUB_OUTPUT

      # Attempt fix - Max 3 iterations
      - name: Apply fixes (limited attempts)
        id: apply_fixes
        if: steps.extract_packages.outputs.has_fixable_packages == 'true'
        env:
          VULNERABLE_PACKAGES: ${{ steps.extract_packages.outputs.packages }}
        run: |
          chmod +x .github/scripts/fix-vulnerabilities.sh
          .github/scripts/fix-vulnerabilities.sh "$VULNERABLE_PACKAGES"

      # Test the fix - Rebuild and rescan
      - name: Rebuild with fixes
        id: rebuild
        if: steps.apply_fixes.outcome == 'success' && steps.extract_packages.outputs.has_fixable_packages == 'true'
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          pull: true
          push: false
          load: true
          tags: alpinetools:scan-fixed
          build-args: |
            GO_VERSION=1.25.8

      - name: Rescan fixed image
        id: rescan
        if: steps.rebuild.outcome == 'success'
        continue-on-error: true
        run: |
          trivy image --format json --output trivy-results-fixed.json \
            --vuln-type os,library \
            --severity HIGH,CRITICAL \
            alpinetools:scan-fixed
          
          vuln_count=$(jq '[.Results[]?.Vulnerabilities // [] | length] | add // 0' trivy-results-fixed.json)
          echo "Vulnerabilities after fix: $vuln_count"
          echo "vuln_count=$vuln_count" >> $GITHUB_OUTPUT
          
          if [ "$vuln_count" -eq 0 ]; then
            echo "✅ All vulnerabilities fixed!"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Some vulnerabilities remain"
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      # Check for outdated GitHub Actions
      - name: Check for outdated actions
        id: check_actions
        run: |
          chmod +x .github/scripts/update-actions.sh
          .github/scripts/update-actions.sh

      # Create PR if there are changes
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to commit"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
            git diff --stat
          fi

      - name: Decide Copilot fallback
        id: copilot_fallback
        if: steps.check_vulns.outputs.has_vulns == 'true'
        run: |
          should_delegate=false
          reason=""

          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            reason="classic remediation already produced a PR candidate"
          elif [ -n "${{ steps.extract_packages.outputs.skipped_targets }}" ]; then
            should_delegate=true
            reason="non-apk targets require a semantic fix"
          elif [ "${{ steps.extract_packages.outputs.has_fixable_packages }}" = "false" ]; then
            should_delegate=true
            reason="no fixable Alpine packages were found"
          elif [ "${{ steps.rescan.outputs.success }}" = "false" ]; then
            should_delegate=true
            reason="classic remediation did not clear all vulnerabilities"
          else
            reason="no Copilot fallback required"
          fi

          echo "should_delegate=$should_delegate" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Dispatch Copilot remediation
        if: steps.copilot_fallback.outputs.should_delegate == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_PAT secret is required to dispatch Copilot remediation."
            exit 1
          fi

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/copilot-remediation.yaml/dispatches" \
            -f ref="${GITHUB_REF_NAME}" \
            -F inputs[attempt]="1" \
            -F inputs[base_branch]="${GITHUB_REF_NAME}"

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: |
            🔒 Auto-remediation: security updates
            
            - Fixed ${{ steps.check_vulns.outputs.vuln_count }} vulnerabilities
            - Updated outdated GitHub Actions
            - Verified with Trivy scan
          branch: auto-remediation/security-updates
          delete-branch: true
          title: '🔒 Auto-remediation: Security and dependency updates'
          body: |
            ## 🤖 Automated Security Remediation
            
            This PR was automatically generated by the auto-remediation workflow.
            
            ### 📊 Summary
            - **Initial vulnerabilities found**: ${{ steps.check_vulns.outputs.vuln_count }}
            - **Vulnerabilities after fix**: ${{ steps.rescan.outputs.vuln_count || 'N/A' }}
            - **Fix successful**: ${{ steps.rescan.outputs.success == 'true' && '✅ Yes' || '⚠️ Partial' }}
            
            ### 🔍 Changes Made
            - Updated vulnerable Alpine packages
            - Updated outdated GitHub Actions versions
            - Verified with Trivy security scan
            
            ### ✅ Testing
            - [x] Docker image builds successfully
            - [x] Trivy scan completed
            - ${{ steps.rescan.outputs.success == 'true' && '[x]' || '[ ]' }} All HIGH/CRITICAL vulnerabilities resolved
            
            ### 📝 Next Steps
            Please review the changes and:
            1. Verify the package updates are appropriate
            2. Check the action updates don't break workflows
            3. Approve and merge if everything looks good
            
            ---
            *Auto-generated by [auto-remediation.yaml](.github/workflows/auto-remediation.yaml)*
          labels: |
            security
            automated
            dependencies

      - name: Summary
        if: always()
        run: |
          echo "## 🔒 Auto-Remediation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Vulnerabilities found**: ${{ steps.check_vulns.outputs.vuln_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Fixable Alpine packages**: ${{ steps.extract_packages.outputs.packages || 'None' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skipped non-apk targets**: ${{ steps.extract_packages.outputs.skipped_targets || 'None' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Fixes applied**: ${{ steps.apply_fixes.outcome == 'success' && '✅ Yes' || '❌ No' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Rebuild successful**: ${{ steps.rebuild.outcome == 'success' && '✅ Yes' || '❌ No' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Vulnerabilities after fix**: ${{ steps.rescan.outputs.vuln_count || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **PR created**: ${{ steps.check_changes.outputs.has_changes == 'true' && '✅ Yes' || '❌ No changes needed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Copilot fallback**: ${{ steps.copilot_fallback.outputs.should_delegate == 'true' && '✅ Dispatched' || '❌ Not needed' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Fallback reason**: ${{ steps.copilot_fallback.outputs.reason || 'None' }}" >> $GITHUB_STEP_SUMMARY
